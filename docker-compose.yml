services:
  postgres:
    image: postgres:16-alpine
    container_name: rgr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: rgr
    networks:
      - rgr-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: rgr-backend
    restart: unless-stopped
    networks:
      - rgr-network
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: rgr-frontend
    ports:
      - "7443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - rgr-network

  boiler-1:
    build: ./boiler
    container_name: rgr-boiler-1
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:4000/api/telemetry
      BOILER_ID: boiler-001
      HMAC_SECRET: secret-key-001
    networks:
      - rgr-network

  boiler-2:
    build: ./boiler
    container_name: rgr-boiler-2
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:4000/api/telemetry
      BOILER_ID: boiler-002
      HMAC_SECRET: secret-key-002
    networks:
      - rgr-network

  boiler-3:
    build: ./boiler
    container_name: rgr-boiler-3
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:4000/api/telemetry
      BOILER_ID: boiler-003
      HMAC_SECRET: secret-key-003
    networks:
      - rgr-network

networks:
  rgr-network:
    external: true

volumes:
  postgres_data:
    external: true
    name: roryraqu_postgres_data